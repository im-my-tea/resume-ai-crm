<!DOCTYPE html>
<html>
<head>
    <title>Resume AI CRM</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
            color: #222;
            background: #f9f9f9;
        }

        h1 { margin-bottom: 4px; }

        nav {
            margin: 8px 0 16px;
        }

        nav a {
            margin-right: 16px;
            text-decoration: none;
            color: #0066cc;
        }

        nav a:hover { text-decoration: underline; }

        hr { border: none; border-top: 1px solid #ddd; margin-bottom: 24px; }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 1px solid #eee;
        }

        th { background: #f0f0f0; font-weight: 600; }

        tr:hover td { background: #fafafa; }

        a { color: #0066cc; }

        input[type="text"], textarea, select {
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }

        button, input[type="submit"] {
            padding: 8px 18px;
            background: #0066cc;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover { background: #0052a3; }

        button.danger {
            background: #cc2200;
        }

        button.danger:hover { background: #a31b00; }

        .card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        pre {
            background: #f4f4f4;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 16px;
            white-space: pre-wrap;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <h1>Resume AI CRM</h1>

    <nav>
        <a href="/">Home</a>
        <a href="/generate">Generate Resume</a>
    </nav>

    <hr>

    {% block content %}
    {% endblock %}

</body>
</html>
