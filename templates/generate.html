{% extends "base.html" %}

{% block content %}

<h2>Generate Resume</h2>

{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<form method="post" action="/generate">

    <p>
        <label>Company</label><br>
        <input type="text" name="company" required style="width:300px;">
    </p>

    <p>
        <label>Role</label><br>
        <input type="text" name="role" required style="width:300px;">
    </p>

    <p>
        <label>Job Description</label><br>
        <textarea name="jd_text" rows="20" cols="80" required></textarea>
    </p>

    <button type="submit" id="submit-btn">Generate</button>

</form>

<div id="loading" style="display:none; margin-top:20px;">
    <p>⏳ Generating your resume... this may take a minute or two.</p>
</div>

<script>
    document.querySelector("form").addEventListener("submit", function () {
        document.getElementById("submit-btn").disabled = true;
        document.getElementById("submit-btn").textContent = "Generating...";
        document.getElementById("loading").style.display = "block";
    });
</script>

{% endblock %}
