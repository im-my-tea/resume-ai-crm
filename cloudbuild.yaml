steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/resume-crm/resume-ai-crm:$COMMIT_SHA
      - .

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/resume-crm/resume-ai-crm:$COMMIT_SHA

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - resume-ai-crm
      - --image=us-central1-docker.pkg.dev/$PROJECT_ID/resume-crm/resume-ai-crm:$COMMIT_SHA
      - --region=us-central1
      - --platform=managed
      - --quiet

options:
  logging: CLOUD_LOGGING_ONLY
