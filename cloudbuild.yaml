steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - $_IMAGE
      - .

  # 2. Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - $_IMAGE

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - resume-ai-crm
      - --image=$_IMAGE
      - --region=$_REGION
      - --platform=managed
      - --quiet

substitutions:
  _REGION: us-central1
  _IMAGE: $_REGION-docker.pkg.dev/$PROJECT_ID/resume-crm/resume-ai-crm:$COMMIT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
